<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Converter</title>
  <meta name="description" content="บริการแปลงไฟล์รูปภาพออนไลน์ฟรี แปลงรูปภาพเป็น JPG, PNG, WEBP, AVIF, SVG หรือรวมไฟล์ภาพเป็น PDF ได้ง่ายๆ ปลอดภัย รวดเร็ว รองรับการใช้งานบนมือถือ" />
  <meta name="author" content="Image Converter Team" />
  <meta name="robots" content="index, follow" />  
  <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css" />
  <link rel="stylesheet" href="bootstrap/icons/bootstrap-icons.min.css" />
  <link rel="preload" href="bootstrap/Sarabun-Bold.ttf" as="font" type="font/ttf" crossorigin>
  <link rel="icon" href="bootstrap/logo.webp" type="image/x-icon">
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">

    <header class="top-bar">
      <div class="top-bar-inner">
        <h1 class="app-title"><i class="bi bi-images"></i>Image Converter</h1>
        <button id="toggle-dark-mode" class="dark-toggle" title="โหมดมืด">
          <i class="bi bi-moon-stars-fill"></i>
        </button>
      </div>
    </header>

    <div class="workspace">

      <aside class="panel file-panel">
        <div id="drop-zone" class="dropzone">
          <i class="bi bi-cloud-arrow-up-fill dropzone-icon"></i>
          <p class="dropzone-title">ลากไฟล์มาวางที่นี่</p>
          <p class="dropzone-hint">หรือ คลิกเพื่อเลือกไฟล์</p>
          <small class="dropzone-types">PNG · JPG · PDF · WEBP · AVIF · GIF · SVG</small>
        </div>

        <div id="file-list-header" class="list-header" style="display:none">
          <span id="file-count" class="badge-count"></span>
          <button id="clear-all-btn" class="btn btn-sm btn-outline-danger" disabled>
            <i class="bi bi-trash3 me-1"></i>ลบทั้งหมด
          </button>
        </div>

        <ul id="file-list" class="list-group list-group-flush file-list-ul" style="display:none"></ul>
      </aside>

      <main class="panel control-panel">
        <div class="ctrl-row">
          <div class="ctrl-group">
            <label class="ctrl-label">นามสกุลที่ต้องการแปลง</label>
            <select id="format-select" class="form-select">
              <option value="jpg">JPG</option>
              <option value="png">PNG</option>
              <option value="webp">WEBP</option>
              <option value="avif">AVIF</option>
              <option value="svg">SVG</option>
              <option value="perpdf">PDF (แยกไฟล์)</option>
            </select>
          </div>
          <div class="ctrl-group">
            <label class="ctrl-label">ประเภท PDF</label>
            <select id="pdf-type-select" class="form-select">
              <option value="color">สี</option>
              <option value="grayscale">ขาวดำ</option>
            </select>
          </div>
        </div>

        <div class="action-row">
          <button id="convert-image-btn" class="btn-action btn-action-grey" disabled>
            <i class="bi bi-arrow-repeat"></i>
            <span>แปลงตามตัวเลือก</span>
          </button>
          <button id="convert-btn" class="btn-action btn-action-blue" disabled>
            <i class="bi bi-file-earmark-pdf-fill"></i>
            <span>รวมเป็น PDF</span>
          </button>
        </div>

        <div id="progress-container" class="prog-wrap" style="display:none">
          <div class="prog-meta">
            <small id="progress-text">กำลังประมวลผล...</small>
            <small id="progress-percent">0%</small>
          </div>
          <div class="prog-track">
            <div id="progress-bar" class="prog-fill" style="width:0%"></div>
          </div>
        </div>

        <div id="result-area"></div>
      </main>
    </div>
  </div>

  <div class="modal fade" id="filenameModal" tabindex="-1" aria-labelledby="filenameModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="filenameModalLabel">ตั้งชื่อไฟล์</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label for="filename-input" class="form-label">ชื่อไฟล์ (ไม่ต้องใส่นามสกุล)</label>
            <input type="text" class="form-control" id="filename-input" placeholder="เช่น: my_file">
            <div class="form-text">ระบบจะรันตัวเลขต่อท้ายให้อัตโนมัติหากมีหลายไฟล์</div>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="use-original-name">
            <label class="form-check-label" for="use-original-name">ใช้ชื่อไฟล์เดิม</label>
          </div>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">ยกเลิก</button>
          <button type="button" class="btn btn-primary" id="confirm-filename">ยืนยัน</button>
        </div>
      </div>
    </div>
  </div>

  <script defer src="bootstrap/js/bootstrap.bundle.min.js"></script>
  <script defer src="index.js"></script>
</body>
</html>
